trigger: none
pool: Default

parameters:
- name: envorment
  type: string
  default: dev
  values:
  - dev
  - qa
  - prod

variables:
- name: workingDir
  value: envorment/${{ parameters.envorment }}

- ${{ if eq(parameters.envorment, 'dev') }}:
  - group: infra-test-july-terraform-dev

- ${{ if eq(parameters.envorment, 'qa') }}:
  - group: infra-test-july-terraform-qa

- ${{ if eq(parameters.envorment, 'prod') }}:
  - group: infra-test-july-terraform-prod
 

stages:
  - stage:
    displayName: Package install 
    jobs:
      - job: 
        displayName: Agent packege install
        steps:
        - script: sudo apt install unzip -y
        - script: sudo apt install openjdk-17-jdk -y
        - script: sudo apt install python3-pip -y

  - stage:
    displayName: terraform 
    jobs:
      - job: 
        displayName: terraform install
        steps:
        - task: TerraformInstaller@1
          displayName: terraform install
          inputs:
            terraformVersion: 'latest'
            
        - task: TerraformTask@5
          displayName: terraform init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(workingdir)'
            backendAzureRmUseEntraIdForAuthentication: false
            backendServiceArm: 'july-service'
            backendAzureRmResourceGroupName: '$(resourcegroupname)'
            backendAzureRmStorageAccountName: '$(storageaccountname)'
            backendAzureRmContainerName: '$(containername)'
            backendAzureRmKey: '$(key)'

        - task: TerraformTask@5
          displayName: terraform plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(workingdir)'
            environmentServiceNameAzureRM: 'july-service'


  - stage:
    displayName: scaning 
    jobs:
      - job: 
        displayName: scaning tools
        steps:
        - task: CmdLine@2
          displayName: Install TruffleHog
          inputs:
            script: |
              wget https://github.com/trufflesecurity/trufflehog/releases/download/v3.95.8/trufflehog_3.95.8_linux_amd64.tar.gz
              tar -xzf trufflehog_3.95.8_linux_amd64.tar.gz
              sudo mv trufflehog /usr/local/bin/
              trufflehog --version
        - task: CmdLine@2
          displayName: Run TruffleHog
          inputs:
            script: |
              cd $(workingdir)
              trufflehog filesystem . --results=verified  --no-update
        
        - task: CmdLine@2
          displayName: tflint install
          inputs:
            script: |
              curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
              sudo mv tflint /usr/local/bin/
              tflint --version
        - task: CmdLine@2
          displayName: Initialize TFLint
          inputs:
            script: |
              cd $(workingdir)
              tflint --init
        - task: CmdLine@2
          continueOnError: true
          displayName: Run tflint
          inputs:
            script: |
              cd $(workingdir)
              tflint --recursive

        - task: CmdLine@2
          displayName: trivy install
          inputs:
            script: |
              wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.64.1_Linux-64bit.tar.gz
              tar -xzf trivy_0.64.1_Linux-64bit.tar.gz
              sudo mv trivy /usr/local/bin/
              trivy --version
        - task: trivy@2
          displayName: trivy scan
          inputs:
            method: 'system'
            type: 'repository'
            target: '$(workingdir)'
            scanners: 'misconfig'
            severities: LOW, MEDIUM, HIGH
            showSuppressed: true
            failOnSeverityThreshold: 'HIGH'
            
        - task: CmdLine@2
          displayName: Install Gitleaks
          inputs:
            script: |
              wget https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz
              tar -xzf gitleaks_8.28.0_linux_x64.tar.gz
              chmod +x gitleaks
              gitleaks version
        - task: CmdLine@2
          continueOnError: true
          displayName: Run gitleaks
          inputs:
            script: './gitleaks detect --source . --verbose'

        # - task: PublishTestResults@2
        #   inputs:
        #     testResultsFormat: 'JUnit'
        #     testResultsFiles: '**/TEST-*.xml'
        #     searchFolder: '$(workingdir)'
        #     failTaskOnFailedTests: true
        #     failTaskOnFailureToPublishResults: true
        #     failTaskOnMissingResultsFile: true
        #     testRunTitle: 'Infra-Gitleaks'

        - task: CmdLine@2
          displayName: checkov install
          inputs:
            script: |
              sudo python3 -m pip install --upgrade pip
              sudo pip3 install checkov
              sudo checkov --version
        - task: CmdLine@2
          displayName: checkov scane
          continueOnError: true
          inputs:
            script: 'sudo checkov -d . --framework terraform'
        - task: tfsec@1
          displayName: tfsec
          inputs:
            version: 'v1.26.0'
            dir: '$(workingdir)'

        # - task: dependency-check-build-task@6
        #   displayName: waspzap scan
        #   inputs:
        #     projectName: 'owaspzap'
        #     scanPath: '$(workingdir)'
        #     format: 'HTML'
        #     uploadReports: true

