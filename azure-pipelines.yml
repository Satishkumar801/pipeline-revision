  - stage:
    displayName: scaning 
    jobs:
      - job: 
        displayName: scaning tools
        steps:
        - task: CmdLine@2
          displayName: Install Gitleaks
          inputs:
            script: |
              VERSION=v8.30.1
              sudo wget https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz
              sudo tar -xzf gitleaks_${VERSION}_linux_x64.tar.gz
              sudo mv gitleaks /usr/local/bin/
              sudo gitleaks version

