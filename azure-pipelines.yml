trigger: none
pool: Default

parameters:
- name: envorment
  type: string
  default: dev
  values:
  - dev
  - qa
  - prod

variables:
- name: workingdir
  value: 'envorment/dev'
# - group: infra-test-july-terraform-dev
 

stages:
  - stage:
    displayName: Package install 
    jobs:
      - job: 
        displayName: Unzip install
        steps:
        - script: sudo apt install unzip -y
        - script: sudo apt install openjdk-17-jdk -y

  - stage:
    displayName: terraform 
    jobs:
      - job: 
        displayName: terraform init plan
        steps:
        - task: TerraformInstaller@1
          displayName: terraform install
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          displayName: terraform init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(workingdir)'
            backendAzureRmUseEntraIdForAuthentication: false
            backendServiceArm: 'service-june'
            backendAzureRmResourceGroupName: 'rajiv-test'
            backendAzureRmStorageAccountName: 'rajivtest221122'
            backendAzureRmContainerName: 'rajivcontainer'
            backendAzureRmKey: 'terraform.tfstate'
        - task: TerraformTask@5
          displayName: terraform plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(workingdir)'
            environmentServiceNameAzureRM: 'service-june'